# Template rendered by the nginx image's envsubst entrypoint;
# ${BACKEND_ORIGIN} comes from the container environment.
server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript application/json image/svg+xml;

  # SPA fallback: any unknown path serves the app shell.
  location / {
    try_files $uri /index.html;
  }

  # Hashed build assets are immutable.
  location /assets/ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location /api/ {
    proxy_pass ${BACKEND_ORIGIN};
    proxy_ssl_verify off;  # backend uses a self-signed cert
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /auth/ {
    proxy_pass ${BACKEND_ORIGIN};
    proxy_ssl_verify off;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
