# Frontend only. Run from this directory:
#   docker network create footbar-net   # once, shared with the backend
#   docker compose up --build
#
# The backend must be up on the same network (see footbar-stats-backend).

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: footbar-frontend
    command: npm run dev -- --host
    environment:
      # Vite dev-proxy target: reach the backend container by its network alias.
      VITE_PROXY_TARGET: https://backend:4000
    ports:
      - "5173:5173"
    volumes:
      - .:/app                     # live source for Vite HMR
      - /app/node_modules          # keep the image's installed deps
    networks:
      default:
        aliases:
          - frontend

networks:
  default:
    name: footbar-net
    external: true
